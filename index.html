<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>galleryblehh</title>
    <!-- Google Fonts for Modern & Fancy Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #16161a;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --accent: #1db954; /* Subtle Spotify green hint for the links */
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Background subtle glow effect */
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(29, 185, 84, 0.05) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        /* Header Style */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            font-style: italic;
            letter-spacing: -1px;
            margin-bottom: 2rem;
            background: linear-gradient(180deg, #ffffff 0%, #a3a3a3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Bio Box Style */
        .bio-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .bio-box:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .bio-box p {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-muted);
            font-weight: 300;
        }

        /* Spotify Info Box Style */
        .spotify-box {
            background: rgba(29, 185, 84, 0.03);
            border: 1px solid rgba(29, 185, 84, 0.15);
            border-radius: 12px;
            padding: 1.2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .spotify-label {
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            color: var(--accent);
        }

        .spotify-details {
            font-family: monospace;
            color: #e2e8f0;
            font-size: 0.95rem;
        }

        /* Smooth entry animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="container">
        <!-- Main Fancy Title -->
        <h1>galleryblehh</h1>

        <!-- Bio Box -->
        <div class="bio-box">
            <p>Welcome to my space. Creative explorer, curator of moods, and digital minimalist. Pull up a chair and stay a while.</p>
        </div>

        <!-- Spotify Section -->
        <div class="spotify-box">
            <span class="spotify-label">For Spotify</span>
            <span class="spotify-details">dunbarmark17@gmail.com</span>
            <span class="spotify-details">galleryblehh</span>
        </div>
    </div>

</body>
</html>
